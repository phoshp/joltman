name: Build and Package

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-14]
        include:
          - os: ubuntu-latest
            exe: joltman
          - os: windows-latest
            exe: joltman.exe
          - os: macos-15-intel
            exe: joltman
          - os: macos-14
            exe: joltman

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Meson and Ninja
      run: pip install meson ninja

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

    - name: Setup Build
      run: meson setup build --buildtype=release

    - name: Compile
      run: meson compile -C build

    - name: Prepare Package
      shell: bash
      run: |
        mkdir -p package_dir
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          APP_DIR="package_dir/Joltman.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp build/${{ matrix.exe }} "$APP_DIR/Contents/MacOS/"
          cp -r assets "$APP_DIR/Contents/Resources/"
        else
          cp build/${{ matrix.exe }} package_dir/
          cp -r assets package_dir/
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: joltman-${{ matrix.os }}
        path: package_dir/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create archives
        run: |
          cd artifacts
          for dir in joltman-*/; do
            dir=${dir%/}
            cd "$dir"
            zip -r "../../${dir}.zip" .
            cd ..
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
