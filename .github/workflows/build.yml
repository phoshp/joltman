name: Build and Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            exe: joltman
          - os: windows-latest
            exe: joltman.exe
          - os: macos-latest
            exe: joltman

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Meson and Ninja
      run: pip install meson ninja

    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

    - name: Setup Build
      run: meson setup build --buildtype=release

    - name: Compile
      run: meson compile -C build

    - name: Prepare Package
      shell: bash
      run: |
        mkdir -p package_dir
        cp build/${{ matrix.exe }} package_dir/
        cp -r assets package_dir/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: joltman-${{ matrix.os }}
        path: package_dir/
